server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache built assets aggressively (they are content-hashed).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: serve index.html for any unmatched route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Uploaded book covers are served directly from the shared media volume.
    location /media/ {
        alias /usr/share/nginx/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Proxy the API, admin and admin static files to the Django backend.
    location ~ ^/(api|admin|static)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
